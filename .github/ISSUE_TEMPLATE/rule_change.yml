name: Rule change
description: A rule could be improved or extended?
title: "`rule-name`: "
labels:
  - change request
  - evaluating
body:
  - type: markdown
    attributes:
      value: |
        Before opening a new issue:
        - Look for existing [open or closed rule proposals](https://github.com/sindresorhus/eslint-node-test/issues?q=is:issue+label%25enhancement)
        - [Report a bug](https://github.com/sindresorhus/eslint-node-test/issues/new?assignees=&labels=&projects=&template=bug_report.md) instead if it's a false positive
  - type: textarea
    validations:
      required: true
    attributes:
      label: Description
      description: Explain the improvement you would like to see.
  - type: textarea
    validations:
      required: true
    attributes:
      label: Examples
      description: Provide examples of test code to detect and the acceptable alternatives.
      value: |
        ```js
        // ❌
        test.skip('does something', () => {});

        // ✅
        test('does something', () => {});
        ```
  - type: textarea
    attributes:
      label: Additional Info
