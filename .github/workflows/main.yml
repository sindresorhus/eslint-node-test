name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    name: Node.js ${{ matrix.node-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 24
        os:
          - ubuntu-latest
        # Even numbers of node-version
        include:
          - os: ubuntu-latest
            node-version: 22
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install --legacy-peer-deps
      - run: npm run test:js
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
      - run: npm install --legacy-peer-deps
      # `npm run lint` includes `lint:dogfooding`, which runs the plugin's own rules on this codebase.
      - run: npm run lint
